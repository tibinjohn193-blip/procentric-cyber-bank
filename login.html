<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procentric Cyber Bank - Secure Entry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(rgba(10, 25, 47, 0.75), rgba(10, 25, 47, 0.85)), url('https://images.unsplash.com/photo-1501167786227-4cba60f6d58f?q=80&w=1200') no-repeat center center/cover; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(255, 255, 255, 0.98); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 380px; text-align: center; border-top: 6px solid #00c853; }
        .bank-logo { font-size: 45px; color: #0a192f; margin-bottom: 10px; }
        h2 { color: #0a192f; margin: 0 0 5px 0; font-size: 22px; letter-spacing: 1px; }
        p.subtitle { color: #666; font-size: 13px; margin-bottom: 25px; }
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i { position: absolute; left: 15px; top: 14px; color: #0a192f; }
        input { width: 100%; padding: 12px 12px 12px 45px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 13px; background: #0a192f; color: #00c853; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #172a45; color: #fff; }
        .links { margin-top: 15px; font-size: 13px; }
        .links a { color: #0a192f; text-decoration: none; font-weight: bold; }
        .msg { background: #ffebee; color: #c62828; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; text-align: left; border-left: 4px solid #c62828; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="bank-logo"><i class="fa-solid fa-shield-halved"></i></div>
        <h2>PROCENTRIC CYBER BANK</h2>
        <p class="subtitle">Cyber Range Core Infrastructure</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="msg"><i class="fa-solid fa-triangle-exclamation"></i> {{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="input-group">
                <i class="fa-solid fa-user-shield"></i>
                <input type="text" name="username" placeholder="Customer User ID" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" name="password" placeholder="Access Password" required>
            </div>
            <button type="submit">Verify & Authenticate</button>
        </form>
        <div class="links">New Operator? <a href="/register">Open Cyber Account</a></div>
    </div>
</body>
</html>
