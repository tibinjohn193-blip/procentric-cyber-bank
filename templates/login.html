<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Procentric Cyber Bank - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between">

    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 text-center">
        <span class="text-xl font-bold text-red-500">🛡️ PROCENTRIC CYBER BANK (VULNERABILITY TRAINING SITE)</span>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 p-8 rounded-lg shadow-xl max-w-md w-full">
            <h2 class="text-2xl font-extrabold text-white text-center mb-6">Customer Login</h2>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="mb-4">
                        {% for message in messages %}
                            <div class="bg-red-950 border border-red-800 text-red-300 px-3 py-2 rounded text-xs font-medium">
                                {{ message.replace('danger:', '') }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Username ID</label>
                    <input type="text" name="username" required autocomplete="off" class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Account Password</label>
                    <input type="password" name="password" required class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded text-sm uppercase tracking-wide shadow transition">Login</button>
            </form>

            <div class="mt-6 pt-4 border-t border-gray-700 text-center text-xs">
                <span class="text-gray-400">New customer?</span>
                <a href="/register" class="text-blue-400 hover:underline ml-1 font-bold">Open Account Online &rarr;</a>
            </div>
        </div>
    </main>

</body>
</html>
