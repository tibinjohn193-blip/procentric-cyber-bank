<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IDB NetBanking - Open Account</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="background-color: #f4f6f9; font-family: sans-serif;">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow p-4" style="border-top: 5px solid #003366;">
                    <h3 class="text-center mb-4" style="color: #003366;">Open Savings Account Online</h3>
                    {% with messages = get_flashed_messages() %}
                        {% if messages %}{% for m in messages %}<div class="alert alert-danger text-center small py-2">{{ m }}</div>{% endfor %}{% endif %}
                    {% endwith %}
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Desired Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Create username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Create password" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Submit Application</button>
                    </form>
                    <hr>
                    <div class="text-center"><a href="/login" style="text-decoration: none; color: #003366;">Back to Login</a></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
