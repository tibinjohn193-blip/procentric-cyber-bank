<!DOCTYPE html>
<html>
<head>
    <title>Online Registration - Cyber Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 450px;">
        <div class="card shadow border-0 mt-5">
            <div class="card-header bg-success text-white text-center py-3">
                <h4>Create Savings Account Node</h4>
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages() %}
                  {% if messages %}
                    {% for message in messages %}
                      <div class="alert alert-danger text-center shadow-sm">⚠️ {{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Choose Username</label>
                        <input type="text" name="username" class="form-control" required placeholder="e.g., student123">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Choose Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="Enter secure password">
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 shadow-sm">Register Online</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/login" class="text-decoration-none text-primary">Already have an account? Login Portal</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
